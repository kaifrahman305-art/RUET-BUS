name: ruet_bus
description: RUET Bus Tracking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0

  # Location
  geolocator: ^12.0.0

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # HTTP
  http: ^1.2.0

  # Device info
  device_info_plus: ^10.1.0

  # Theme persistence
  shared_preferences: ^2.3.0

  # State management
  provider: ^6.1.2

  # Route polylines
  flutter_polyline_points: ^2.0.0

  # ── NEW: Local Push Notifications ────────────────────────
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/ruet_logo.png
    - assets/images/ruet_gate.jpg
    - assets/images/bus.png
    - assets/images/student.png
    - assets/images/ruet_app_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ruet_app_logo.png"